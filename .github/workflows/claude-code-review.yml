name: Claude Tech Lead Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  tech-lead-review:
    # Skip la branche doc/medium-report : elle ne contient que docs/medium-journal.md
    # alimenté par la routine daily-recap. Pas de code Python à reviewer.
    if: github.event.pull_request.head.ref != 'doc/medium-report'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install review tooling
        run: |
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            pip install ruff radon bandit mypy
          fi

      - name: Run tech-lead-reviewer agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            Tu es l'agent `tech-lead-reviewer` (sa définition complète est dans
            `.claude/agents/tech-lead-reviewer.md` — lis-la et applique-la
            intégralement). Contexte : PR #${{ github.event.pull_request.number }}
            sur la branche `${{ github.event.pull_request.head.ref }}` vs `main`.

            Étapes obligatoires :
              1. `git diff --name-only origin/main...HEAD -- '*.py'` pour la liste des fichiers
              2. lance ruff / radon cc / radon mi / bandit / mypy sur ces fichiers
              3. lis chaque fichier modifié en entier
              4. calcule la note maintenabilité (0-10) selon le barème de l'agent
              5. compose le commentaire markdown au template strict de l'agent
              6. poste-le sur la PR :
                 `gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file <fichier>`

            Pas d'édition de fichier source, pas de commit, pas de merge.
          claude_args: |
            --model claude-haiku-4-5-20251001
            --allowedTools "Bash,Read,Grep,Glob,Write"
            --max-turns 40
