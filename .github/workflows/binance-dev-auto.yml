name: Auto-implement ticket (binance-dev)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Numéro de l'issue GitHub à implémenter"
        required: true
        type: number
      item_node_id:
        description: "node_id de l'item Projects V2 (pour basculer en In review)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch issue title and check AUTO label
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          RESULT=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json title,labels)
          TITLE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          HAS_AUTO=$(echo "$RESULT" | python3 -c "import sys,json; labels=[l['name'] for l in json.load(sys.stdin)['labels']]; print('true' if 'AUTO' in labels else 'false')")

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "Issue : #$ISSUE_NUMBER — $TITLE (AUTO=$HAS_AUTO)"

          if [ "$HAS_AUTO" != "true" ]; then
            echo "❌ L'issue #$ISSUE_NUMBER n'a pas le label AUTO — workflow annulé."
            exit 1
          fi

      - name: Run binance-dev agent
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ITEM_NODE_ID: ${{ inputs.item_node_id }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_PAT }}
          prompt: |
            Tu es l'agent `binance-dev` (lis sa définition complète dans
            `.claude/agents/binance-dev.md`). Implémente le ticket
            #${{ inputs.issue_number }} — "${{ steps.issue.outputs.title }}".

            Contexte CI (différences par rapport à l'exécution locale) :
            - Pas d'alias `git-perso` — utilise directement :
              `git config user.email "claude-bot@github.com"`
              `git config user.name "claude[bot]"`
            - `GH_TOKEN` est déjà exporté avec un PAT ayant les scopes repo+project
            - Python 3.11 est disponible via `python3` ou `python`
            - Pas de venv `.venv` à créer — utilise directement le Python système
            - Pas de `binance-cli` en CI — pour le syntax check, utilise uniquement :
              `python3 -c "import ast; ast.parse(open('scripts/webhook_server.py').read())"`

            Étapes :
            1. Lis `.claude/agents/binance-dev.md` en entier.
            2. Lis l'issue : `gh issue view $ISSUE_NUMBER --repo ${{ github.repository }}`
            3. Lis `CLAUDE.md` et `scripts/webhook_server.py` en entier.
            4. Crée la branche `feat/issue-$ISSUE_NUMBER-<slug>` depuis main.
            5. Implémente le ticket (uniquement `scripts/webhook_server.py` et/ou `config.json`).
            6. Vérifie la syntaxe Python.
            7. Commit + push + ouvre une PR liée à l'issue #$ISSUE_NUMBER.
            8. Si $ITEM_NODE_ID est non vide, bascule le ticket en "In review" via GraphQL :
               ```bash
               curl -s -X POST https://api.github.com/graphql \
                 -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Content-Type: application/json" \
                 -d "{\"query\":\"mutation { updateProjectV2ItemFieldValue(input: { projectId: \\\"PVT_kwHOC0Dy0s4BYYhT\\\", itemId: \\\"$ITEM_NODE_ID\\\", fieldId: \\\"PVTSSF_lAHOC0Dy0s4BYYhTzhTexN4\\\", value: { singleSelectOptionId: \\\"df73e18b\\\" } }) { projectV2Item { id } } }\"}"
               ```

            Garde-fous inchangés : jamais git add -A, jamais force-push, jamais merger la PR,
            jamais modifier .env/CLAUDE.md/state/trade_history.json.
          claude_args: |
            --model claude-haiku-4-5-20251001
            --allowedTools "Bash,Read,Edit,Write,Grep,Glob"
            --max-turns 60
