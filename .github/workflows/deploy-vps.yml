name: Deploy to VPS

# Déclenchement manuel uniquement — après avoir mergé une PR sur main et vérifié
# que le merge convient. Pas de déploiement automatique sur un bot qui manipule
# de l'argent réel.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest main and restart service
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd ~/agent-binance
            git pull origin main
            sudo /usr/bin/systemctl restart webhook-bot
            sleep 3
            sudo /usr/bin/systemctl status webhook-bot --no-pager
          '
